    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Booked, Busy & Paid 💖</title>

  <!-- 💖 ICON + APP SETTINGS -->
  <link rel="icon" type="image/png" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="theme-color" content="#ff5db1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>💅🏾 Booked, Busy & Paid 💸</h1>

  <!-- DAILY NUDGE -->
  <div id="dailyNudge" style="display:none;"></div>

  <!-- SCORE HUD -->
  <div class="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Coins: <span id="coins">0</span></div>
    <div>Level: <span id="level">1</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>

  <!-- GAME -->
  <canvas id="game" width="400" height="600"></canvas>

  <!-- SHOP -->
  <div class="shop">
    <h3>🛍️ Upgrade Shop</h3>

    <button id="widerBtn">Wider Paddle (10)</button>
    <button id="slowBtn">Slow Ball (15)</button>

    <div class="mini">
      Planner clicks: <span id="clickCount">0</span>
    </div>

    <div class="mini">
      Catch the bag. Stay focused. Don’t get distracted.
    </div>
  </div>

  <!-- MAIN CTA -->
  <button id="shopBtn" class="planner-btn">
    Shop Planner 💖
  </button>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
    <script src="/script.js"></script>
  </body>

</html>
